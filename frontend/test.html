<!DOCTYPE html>
<html>

<head>

    <title>AptiMind AI Test</title>

    <link rel="stylesheet" href="css/dashboard.css">

    <style>

        .test-container{
            max-width:1000px;
            margin:auto;
        }

        .progress-container{
            width:100%;
            height:18px;
            background:#1e293b;
            border-radius:30px;
            overflow:hidden;
            margin:25px 0;
        }

        #progressBar{
            width:0%;
            height:100%;
            background:linear-gradient(90deg,#2563eb,#38bdf8);
            transition:.4s;
        }

        .top-bar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        #questionNumber{
            color:#38bdf8;
            font-size:22px;
        }

        #timer{
            background:#ef4444;
            color:white;
            padding:10px 20px;
            border-radius:10px;
            font-weight:bold;
        }

        .question-card{

            background:#111827;

            border:1px solid #38bdf8;

            border-radius:18px;

            padding:30px;

            box-shadow:0 10px 30px rgba(56,189,248,.2);

            margin-bottom:30px;

        }

        #question{

            color:white;

            font-size:28px;

            line-height:1.6;

        }

        .option-card{

            display:flex;

            align-items:center;

            gap:15px;

            background:#111827;

            border:2px solid #334155;

            border-radius:15px;

            padding:18px;

            margin-bottom:18px;

            cursor:pointer;

            transition:.3s;

            color:white;

            font-size:18px;

        }

        .option-card:hover{

            border-color:#38bdf8;

            background:#1e293b;

            transform:translateY(-2px);

        }

        .option-card input{

            width:auto;

            margin:0;

            transform:scale(1.3);

        }

        .button-row{

            display:flex;

            justify-content:space-between;

            margin-top:35px;

        }

        button{

            min-width:160px;

        }

    </style>

</head>

<body>

<div class="main-content">

<div class="test-container">

<h1>📝 AptiMind AI Test</h1>

<div class="progress-container">

<div id="progressBar"></div>

</div>

<div class="top-bar">

<h3 id="questionNumber"></h3>

<h3 id="timer">⏰ 15:00</h3>

</div>

<div class="question-card">

<h2 id="question"></h2>

</div>

<div id="options"></div>

<div class="button-row">

<button onclick="previousQuestion()">
⬅ Previous
</button>

<button onclick="nextQuestion()">
Next ➜
</button>

</div>

</div>

</div>

<script>
 let questions = JSON.parse(localStorage.getItem("questions"));

if (typeof questions === "string") {
    questions = JSON.parse(questions);
}

let currentQuestion = 0;
let userAnswers = [];
let timeLeft = 15 * 60;
let timer;

displayQuestion();
startTimer();

function displayQuestion() {

    document.getElementById("questionNumber").innerHTML =
        `Question ${currentQuestion + 1} of ${questions.length}`;

    let progress =
        ((currentQuestion + 1) / questions.length) * 100;

    document.getElementById("progressBar").style.width =
        progress + "%";

    document.getElementById("question").innerHTML =
        questions[currentQuestion].question;

    let html = "";

    questions[currentQuestion].options.forEach(option => {

        let checked =
            userAnswers[currentQuestion] === option
                ? "checked"
                : "";

        html += `
        <label class="option-card">
            <input
                type="radio"
                name="answer"
                value="${option}"
                ${checked}>
            <span>${option}</span>
        </label>
        `;

    });

    document.getElementById("options").innerHTML = html;

    const buttons = document.querySelectorAll(".button-row button");

    if (currentQuestion === questions.length - 1) {
        buttons[1].innerHTML = "✅ Submit Test";
    } else {
        buttons[1].innerHTML = "Next ➜";
    }

}

function previousQuestion() {

    if (currentQuestion === 0) {
        return;
    }

    const selected =
        document.querySelector('input[name="answer"]:checked');

    if (selected) {
        userAnswers[currentQuestion] = selected.value;
    }

    currentQuestion--;

    displayQuestion();

}

function nextQuestion() {

    const selected =
        document.querySelector('input[name="answer"]:checked');

    if (!selected) {

        alert("Please select an answer.");

        return;

    }

    userAnswers[currentQuestion] = selected.value;

    if (currentQuestion === questions.length - 1) {

        finishTest();

        return;

    }

    currentQuestion++;

    displayQuestion();

}

function finishTest() {

    clearInterval(timer);

    localStorage.setItem(
        "userAnswers",
        JSON.stringify(userAnswers)
    );

    localStorage.setItem(
        "timeTaken",
        (15 * 60) - timeLeft
    );
    localStorage.setItem("testType","AI Test");
    window.location.href = "result.html";

}

function startTimer() {

    timer = setInterval(() => {

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        if (seconds < 10) {
            seconds = "0" + seconds;
        }

        document.getElementById("timer").innerHTML =
            `⏰ ${minutes}:${seconds}`;

        timeLeft--;

        if (timeLeft < 0) {

            alert("⏰ Time is Up!");

            finishTest();

        }

    }, 1000);

}

</script>

</body>
</html>
