<!DOCTYPE html>
<html>

<head>

    <title>Test Result</title>

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body style="background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a);">

<div class="main-content">

    <div class="card" style="text-align:center;max-width:700px;margin:auto;">

        <h1 style="
         font-size:42px;
         color:#38bdf8;
         margin-bottom:20px;">
         🎉 Test Completed
        </h1>

        <h2 id="score"
         style="
         font-size:65px;
         color:#38bdf8;
         margin:20px 0;
         font-weight:bold;">
        </h2>

        <div style="width:100%;background:#4bdd5e;border-radius:20px;height:25px;margin:20px 0;">

            <div id="scoreBar"
                 style="height:25px;
                        width:0%;
                        border-radius:20px;
                        background:linear-gradient(90deg,#22c55e,#38bdf8);
                        transition:1s;">
            </div>

        </div>

        <h2 id="percentage"
         style="
         font-size:35px;
         color:#22c55e;
         margin-top:15px;">
        </h2>

        <h3 id="performance"
         style="
         margin-top:20px;
         font-size:26px;
         color:#facc15;">
        </h3>
        <h3 id="timeUsed"
         style="
         color:#38bdf8;
         margin-top:15px;">
        </h3>

        <div id="summaryBox"
         style="
         margin-top:25px;
         padding:20px;
         background:#111827;
         border:1px solid #38bdf8;
         border-radius:15px;
         color:white;
         text-align:left;
         line-height:35px;
         font-size:18px;">
        </div>

    </div>

    <br>

    <div style="margin-top:40px;">
      <h2 style="color:#38bdf8;">📖 Answer Review</h2>
    </div>

    <br>

    <div id="review"></div>
    <br><br>

    <div style="text-align:center;">

      <button onclick="goHome()">
      🏠 Back to Dashboard
      </button>

    </div>


</div>

<script>

let questions = JSON.parse(localStorage.getItem("questions"));

if(typeof questions === "string"){
    questions = JSON.parse(questions);
}

let userAnswers = JSON.parse(localStorage.getItem("userAnswers"));

let timeTaken =
parseInt(localStorage.getItem("timeTaken")) || 0;

let minutes =
Math.floor(timeTaken / 60);

let seconds =
timeTaken % 60;

let score = 0;
let review = "";

questions.forEach((q,index)=>{

    let correct = q.correctAnswer;
let user = userAnswers[index];

// Extract option letter if AI returns only A/B/C/D
let userOption = user ? user.trim().charAt(0).toUpperCase() : "";

let isCorrect = false;

// If correctAnswer is A/B/C/D
if(correct.length === 1){
    isCorrect = (userOption === correct.toUpperCase());
}
// Otherwise compare full answer
else{
    isCorrect = (user === correct);
}

if(isCorrect){
        score++;

        review += `
        <div class="card" style="
        border-left:6px solid #22c55e;
        margin-bottom:25px;
        padding:25px;
        border-radius:15px;
        box-shadow:0 8px 20px rgba(34,197,94,0.25);
        ">

            <h3 style="color:#ef4444;">✅ Question ${index+1}</h3>

            <p style="color:white;"><b>${q.question}</b></p>

            <p style="color:#22c55e;">
            ✔ Your Answer : ${user}
            </p>

        </div>
        `;

    }

    else{

        review += `
        <div class="card" style="
        border-left:6px solid #ef4444;
        margin-bottom:25px;
        padding:25px;
        border-radius:15px;
        box-shadow:0 8px 20px rgba(239,68,68,0.25);
        ">

            <h3 style="color:#ef4444;">❌ Question ${index+1}</h3>

            <p style="color:white;"><b>${q.question}</b></p>

            <p style="color:#ef4444;">
            ❌ Your Answer : ${user || "Not Answered"}
            </p>

            <p style="color:#22c55e;">
            ✅ Correct Answer :
            ${
            q.options
            ? q.options[
            correct.charCodeAt(0)-65
            ] || correct
            : correct
            }
            </p>

            <div style="
            margin-top:20px;
            padding:20px;
            background:#0f172a;
            border-left:5px solid #38bdf8;
            border-radius:12px;
            color:#e2e8f0;
            line-height:30px;
            font-size:17px;
            box-shadow:0 5px 15px rgba(56,189,248,0.2);">

                <b>💡 Explanation</b>

                <br><br>

                ${q.explanation}

            </div>

        </div>
        `;

    }

});

let percentage =
((score/questions.length)*100).toFixed(0);

document.getElementById("score").innerHTML =
`${score} / ${questions.length}`;

document.getElementById("percentage").innerHTML =
percentage + "%";

document.getElementById("scoreBar").style.width =
percentage + "%";

if(percentage>=90){

document.getElementById("performance").innerHTML=
"🏆 Excellent! Placement Ready";

}
else if(percentage>=70){

document.getElementById("performance").innerHTML=
"👏 Very Good Performance";

}
else if(percentage>=50){

document.getElementById("performance").innerHTML=
"👍 Good. Keep Practicing";

}
else{

document.getElementById("performance").innerHTML=
"📚 Practice More to Improve";

}

document.getElementById("timeUsed").innerHTML =
"⏱ Time Taken : " +
minutes +
" min " +
seconds +
" sec";
let wrong = questions.length - score;

document.getElementById("summaryBox").innerHTML = `
<h2 style="color:#38bdf8;">📊 Test Summary</h2>

<p>✅ Correct Answers : <b>${score}</b></p>

<p>❌ Wrong Answers : <b>${wrong}</b></p>

<p>🎯 Accuracy : <b>${percentage}%</b></p>

<p>⏱ Time Taken : <b>${minutes} min ${seconds} sec</b></p>

<p>📅 Date : <b>${new Date().toLocaleDateString()}</b></p>
`;
document.getElementById("review").innerHTML=review;
const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

// Save Result History

let testType =
localStorage.getItem("testType") || "AI Test";

let results =
JSON.parse(localStorage.getItem("results")) || [];

if(testType=="AI Test"){

    results.push({

        date:new Date().toLocaleString(),

        score:score,

        total:questions.length,

        percentage:((score/questions.length)*100).toFixed(0),

        timeTaken:timeTaken

    });

    localStorage.setItem(
    "results",
    JSON.stringify(results)
    );
    if(currentUser){

fetch("http://localhost:3000/api/results/save",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userId:currentUser._id,

fullname:currentUser.fullname,

email:currentUser.email,

testId:localStorage.getItem("currentTestId"),

score:score,

total:questions.length,

percentage:((score/questions.length)*100).toFixed(0)

})

})
.then(res=>res.json())
.then(data=>{

console.log("Result Saved:",data);

})
.catch(err=>{

console.log(err);

});

}

}

else{

const currentUser =
JSON.parse(localStorage.getItem("currentUser"));

const testId =
localStorage.getItem("currentTestId");

fetch(
"http://localhost:3000/api/results/admin",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

testId:testId,

userId:currentUser._id,

fullname:currentUser.fullname,

email:currentUser.email,

score:score,

total:questions.length,

percentage:Number(percentage)

})

})
.then(res=>res.json())
.then(data=>{

console.log(data);

})
.catch(err=>console.log(err));

}

</script>

</body>

</html>
