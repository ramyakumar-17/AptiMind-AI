<!DOCTYPE html>
<html>

<head>

<title>Admin Test Leaderboard</title>

<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="main-content">

<h1>🏆 Admin Test Leaderboard</h1>

<br>

<table>

<thead>

<tr>

<th>Rank</th>
<th>Name</th>
<th>Score</th>
<th>Percentage</th>
<th>Date</th>

</tr>

</thead>

<tbody id="leaderboardBody">

</tbody>

</table>

<br>

<div style="text-align:center;">

<button onclick="goHome()">

🏠 Back

</button>

</div>

</div>

<script>

let leaderboard =
JSON.parse(localStorage.getItem("adminLeaderboard")) || [];

leaderboard.sort((a,b)=>b.score-a.score);

let html="";

leaderboard.forEach((user,index)=>{

let medal=index+1;

if(index==0){

medal="🥇";

}
else if(index==1){

medal="🥈";

}
else if(index==2){

medal="🥉";

}

html+=`

<tr>

<td>${medal}</td>

<td>${user.name}</td>

<td>${user.score}/${user.total}</td>

<td>${user.percentage}%</td>

<td>${user.date}</td>

</tr>

`;

});

document.getElementById("leaderboardBody").innerHTML=html;

function goHome(){

window.location.href="user-dashboard.html";

}

</script>

</body>

</html>
